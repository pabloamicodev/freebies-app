name = "Promo Engine"
client_id = "e03afab02eae9991483e4bc54d649c3c"
application_url = "https://freebies-app-shopify-admin.vercel.app"
embedded = true
handle = "promo-engine-hpn"

[build]
automatically_update_urls_on_dev = true

[auth]
redirect_urls = [
  "https://freebies-app-shopify-admin.vercel.app/auth/callback",
  "https://freebies-app-shopify-admin.vercel.app/auth/shopify/callback",
  "https://freebies-app-shopify-admin.vercel.app/api/auth/callback",
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/products"
  topics = [ "products/update", "products/delete", "products/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/inventory"
  topics = [ "inventory_levels/update", "inventory_levels/connect" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders"
  topics = [ "orders/paid", "orders/cancelled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers"
  topics = [ "customers/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/markets"
  topics = [ "markets/create", "markets/update", "markets/delete" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app-uninstalled"
  topics = [ "app/uninstalled" ]

[webhooks.privacy_compliance]
customer_deletion_url = "https://freebies-app-shopify-admin.vercel.app/webhooks/gdpr"
customer_data_request_url = "https://freebies-app-shopify-admin.vercel.app/webhooks/gdpr"
shop_deletion_url = "https://freebies-app-shopify-admin.vercel.app/webhooks/gdpr"

[access_scopes]
# write_metafields/read_metafields: the offer-publisher writes the compiled
# function config to a shop metafield (metafieldsSet) read by the discount function.
# read_all_orders removed: it requires Shopify approval and is unnecessary —
# read_orders covers the trailing-60-day window the analytics dashboard uses.
scopes = "read_products,read_product_listings,read_inventory,read_publications,read_markets,read_discounts,write_discounts,read_customers,read_orders,read_metafields,write_metafields,read_metaobjects,write_metaobjects,read_locales,read_themes,write_app_proxy"

[pos]
embedded = false
runtime_context = "strict"

[app_proxy]
url = "https://freebies-app-shopify-admin.vercel.app/apps/promo-engine"
prefix = "apps"
subpath = "promo-engine"
